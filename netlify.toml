[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["sharp", "ssh2"]
  included_files = [
    "node_modules/sharp/**/*",
    "node_modules/ssh2/lib/protocol/crypto/build/Release/**"
  ]

# Help Netlify Dev choose the right framework command
[dev]
  framework = "astro"
  command = "astro dev --host 0.0.0.0 --port 3000"
  targetPort = 3000
  port = 8888
  autoLaunch = false

# Local dev should not preload the Netlify build container shim.
[context.dev.environment]
  NODE_OPTIONS = "" # Clear aws-secrets-shim preload for netlify dev.

# Build plugins
[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = [
      "node_modules/.cache",
      ".astro",
      ".cache",
      "package-lock.json"
    ]

[[plugins]]
  package = "netlify-plugin-inline-critical-css"
  [plugins.inputs]
    fileFilter = ["*.html", "!demo.html"]
    directoryFilter = ["!node_modules"]
    extract = true

#[[plugins]]
#  package = "netlify-plugin-minify-html"

[[plugins]]
  package = "netlify-plugin-submit-sitemap"
  [plugins.inputs]
    baseUrl = "https://fasmotorsports.com"
    sitemapPath = "/sitemap_index.xml"

[[plugins]]
  package = "@netlify/plugin-lighthouse"
  [plugins.inputs]
    output_path = "tmp/lighthouse-report.html"
    fail_deploy_on_score_thresholds = false

[[plugins]]
  package = "netlify-plugin-checklinks"
  [plugins.inputs]
    entryPoints = ["index.html"]
    recursive = false
    checkExternal = false
    skipPatterns = [
      "load dist/",
      "inline Svg"
    ]

## Removed netlify-plugin-csp (not on npm) in favor of static CSP header below

# Caching headers
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=300, stale-while-revalidate=600"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://*.stripe.com https://www.googletagmanager.com https://apis.google.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://js.stripe.com https://app.netlify.com https://ve.netlify.app https://*.netlify.app https://www.googleadservices.com https://googleads.g.doubleclick.net https://www.google-analytics.com; frame-src https://*.stripe.com https://www.google.com https://www.google.com/recaptcha/ https://js.stripe.com https://app.netlify.com https://*.netlify.app https://www.youtube.com https://youtube.com; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* https://api.fasmotorsports.com https://*.stripe.com https://api.stripe.com https://*.sanity.io https://app.netlify.com https://ve.netlify.app https://*.netlify.app wss://*.netlify.app wss://ve.netlify.app https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://www.google.com https://www.googleadservices.com https://googleads.g.doubleclick.net; img-src 'self' https://*.stripe.com data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://*.stripe.com https://fonts.gstatic.com https://r2cdn.perplexity.ai https://fasmotorsports.com https://www.fasmotorsports.com https://*.fasmotorsports.com data:; media-src 'self' https: http: blob: data:; frame-ancestors 'self' https://app.netlify.com https://*.netlify.app"

# Asset-specific long-lived cache rules override the default HTML TTL.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Origin, Content-Type, Accept"

[[headers]]
  for = "/fas-auth.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Avoid caching the account page so auth callback always runs with fresh HTML
[[headers]]
  for = "/account"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/account/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
