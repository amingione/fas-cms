# Astro already generates the correct serverless function routing for SSR builds.
# A blanket SPA-style catch-all would rewrite asset requests (e.g. CSS, JS, Astro
# component modules) to the HTML shell which then surfaces in the browser as
# "Failed to load module script" MIME-type errors. Removing the fallback keeps
# the platform-provided routing intact while still allowing the upstream
# redirect table above to function as intended.

## Note: Custom auth uses Astro API under /api/auth/*; no redirects needed.

[build]
  command = "yarn build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  GO_VERSION = "1.20"
  PHP_VERSION = "8.3"
  NETLIFY_USE_YARN = "true"
  NETLIFY_EXPERIMENTAL_YARN_BERRY = "true"
  YARN_VERSION = "4.12.0"
  # Used by /api/checkout to build absolute success/cancel URLs
  # In production on Netlify, forwarded host headers are present, so this is a safe default.
  PUBLIC_BASE_URL = "https://fasmotorsports.com"
  # Canonical site URL used as a fallback by auth flows
  PUBLIC_SITE_URL = "https://fasmotorsports.com"
  # Public Sanity config (baked into client-side bundle at build time)
  PUBLIC_SANITY_PROJECT_ID = "r4og35qd"
  PUBLIC_SANITY_DATASET = "production"
  PUBLIC_SANITY_API_VERSION = "2025-10-22"
  PUBLIC_SANITY_STUDIO_URL = "https://fassanity.fasmotorsports.com"
  PUBLIC_SANITY_FUNCTIONS_BASE_URL = "https://fassanity.fasmotorsports.com"
  PUBLIC_SANITY_ENABLE_CACHE = "true"
  PUBLIC_SANITY_CACHE_TTL_SECONDS = "300"
  # Sanity build-time config (non-secret identifiers)
  SANITY_PROJECT_ID = "r4og35qd"
  SANITY_DATASET = "production"
  SANITY_API_VERSION = "2025-10-22"
  SANITY_STUDIO_URL = "https://fassanity.fasmotorsports.com"
  SANITY_FUNCTIONS_BASE_URL = "https://fassanity.fasmotorsports.com"
  # Stripe API version (non-secret)
  STRIPE_API_VERSION = "2025-08-27.basil"
  # Google Merchant Center feed defaults (build-time, non-secret)
  GMC_SFTP_HOST = "partnerupload.google.com"
  GMC_SFTP_PORT = "19321"
  GMC_SFTP_FEED_FILENAME = "fas-products-feed.txt"
  GMC_FEED_BASE_URL = "https://fasmotorsports.com"
  GMC_FEED_CURRENCY = "USD"
  GMC_FEED_DEFAULT_QUANTITY = "30"
  GMC_FEED_DEFAULT_WEIGHT_LB = "1"
  GMC_FEED_SHIPPING_PRICE = "0.00"
  GMC_FEED_LANGUAGE = "en"
  GMC_FEED_TARGET_COUNTRY = "US"
  GMC_CONTENT_API_BATCH_SIZE = "250"
  GMC_CONTENT_API_MERCHANT_ID = "5664091767"
  GMC_SFTP_USERNAME = "mc-sftp-5664091767"
  # Shippo warehouse/origin address (non-secret constants)
  SHIPPO_ORIGIN_NAME = "F.A.S. Motorsports LLC"
